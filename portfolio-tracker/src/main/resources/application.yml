spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:portfolio}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:portfolio_user}
    password: ${DB_PASSWORD:portfolio123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: false

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:portfolioTrackerSecretKey2024!@#ChangeInProd$%^&*(1234567890abcdefghijk}
  expiration: 86400000

kite:
  api-key: ${KITE_API_KEY:}
  api-secret: ${KITE_API_SECRET:}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-sonnet-4-6
  max-tokens: 2048

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
    default-models-expand-depth: 1
    doc-expansion: none
    persist-authorization: true
  packages-to-scan: com.portfolio.controller
  default-produces-media-type: application/json

logging:
  level:
    com.portfolio: INFO
